owner: aaronsentell
repo: my-status-page
workflow-schedules:
  uptime: "0 0 1 * *"

sites:
  # ── App projects ──────────────────────────────────────────────────────────
  # Each app project gets two checks:
  #   1. Base URL — verifies the Cloudflare Worker route is live and Pages is
  #      serving. These three apps (Sunburn, Pollen, Round on Me) run a Worker
  #      that proxies to a separate Pages deployment, so the two layers can fail
  #      independently: a broken Pages deploy returns 5xx from the base URL while
  #      the Worker is still alive, and a misconfigured Worker route returns 5xx
  #      while Pages is fine. Both are real failure modes worth catching.
  #   2. /api/health — verifies external dependencies the base URL check misses:
  #      third-party APIs, KV bindings, and secrets. Returns 200 ok or 503
  #      degraded with a JSON body describing what failed.
  #
  # Pour Choices is a Pages project with integrated Functions (same deployment),
  # so the base URL and /api/health can't diverge on the Pages layer — but
  # Supabase is an external dependency that /api/health catches independently.

  - name: Pour Decisions
    url: https://pour.madebyaaron.app
    group: Pour Decisions
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍸</text></svg>"
    __dangerous__body_down_if_text_missing: Atlanta Happy Hour Map
  - name: Pour Decisions API
    url: https://pour.madebyaaron.app/api/health
    group: Pour Decisions
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍸</text></svg>"

  - name: Round on Me
    url: https://round.madebyaaron.app
    group: Round on Me
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥂</text></svg>"
    __dangerous__body_down_if_text_missing: Enter a round code
  - name: Round on Me API
    url: https://round.madebyaaron.app/api/health
    group: Round on Me
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥂</text></svg>"

  - name: The Pollening
    url: https://pollen.madebyaaron.app
    group: The Pollening
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤧</text></svg>"
    __dangerous__body_down_if_text_missing: Atlanta Pollen Count
  - name: The Pollening API
    url: https://pollen.madebyaaron.app/api/health
    group: The Pollening
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤧</text></svg>"

  - name: SPF or RIP
    url: https://burn.madebyaaron.app
    group: SPF or RIP
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>"
    __dangerous__body_down_if_text_missing: Atlanta's sunburn timer
  - name: SPF or RIP API
    url: https://burn.madebyaaron.app/api/health
    group: SPF or RIP
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>"

  - name: Fix It, Atlanta
    url: https://fixit.madebyaaron.app
    group: Fix It, Atlanta
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚧</text></svg>"
    __dangerous__body_down_if_text_missing: Fix It, Atlanta

  # ── Static sites ──────────────────────────────────────────────────────────
  # Pure static HTML — no backend, no API dependencies. Base URL is the only
  # meaningful check. These are served directly by Cloudflare Pages or a CDN,
  # so a 200 with content is sufficient confirmation they're up.

  - name: Project Website (madebyaaron.app)
    url: https://madebyaaron.app
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗️</text></svg>"
    __dangerous__body_down_if_text_missing: Welcome to my 2 AM ideas
  - name: Personal Website (aaronsentell.com)
    url: https://aaronsentell.com
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👋</text></svg>"
    __dangerous__body_down_if_text_missing: Beltline Fiend
  - name: Referral Site
    url: $REFERRAL_SITE
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>"
  - name: Civic Site
    url: $CONTACT_REPS
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>"

status-website:
  cname: status.madebyaaron.app
  logoUrl: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗️</text></svg>"
  name: Made by Aaron Status Page
  introTitle: "**App Status**"
  introMessage: Real-time monitoring and status page for my personal websites and projects.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  theme: light
  customHeadHtml: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  css: |
    :root {
      --accent: #FF4F1F;
      --accent-light: #FFF0EB;
      --bg: #FAFAF7;
      --surface: #FFFFFF;
      --text: #111111;
      --muted: #6B7280;
      --border: #E5E5E0;
      --radius: 16px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
    }

    /* ── Base ── */
    html, body {
      font-family: 'Inter', sans-serif !important;
      background-color: var(--bg) !important;
      color: var(--text) !important;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* ── Typography ── */
    h1, h2, h3, h4, h5, h6,
    .h1, .h2, .h3, .h4, .h5, .h6 {
      font-family: 'Space Grotesk', sans-serif !important;
      font-weight: 700 !important;
      letter-spacing: -0.01em;
      color: var(--text) !important;
    }

    p, li, td, th, label, span {
      font-family: 'Inter', sans-serif !important;
    }

    .text-muted, small, .small {
      color: var(--muted) !important;
      font-size: 13px;
    }

    /* ── Links ── */
    a {
      color: var(--accent) !important;
      text-decoration: none;
    }
    a:hover {
      color: var(--text) !important;
      text-decoration: none;
    }

    /* ── Navbar ── */
    nav, .navbar, header {
      background-color: var(--surface) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    .navbar-brand, .site-name, nav .brand {
      font-family: 'Space Grotesk', sans-serif !important;
      font-weight: 700 !important;
      font-size: 18px !important;
      letter-spacing: -0.01em;
      color: var(--text) !important;
    }

    .nav-link, .navbar-nav a {
      font-size: 14px !important;
      font-weight: 500 !important;
      color: var(--muted) !important;
    }
    .nav-link:hover, .navbar-nav a:hover {
      color: var(--accent) !important;
    }

    /* ── Cards / status items ── */
    .card, .status-card, [class*="status-item"] {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
    }

    .card-body {
      padding: 24px !important;
    }

    /* ── Status badges ── */
    .badge, .pill, [class*="badge"] {
      font-family: 'Inter', sans-serif !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      letter-spacing: 0.06em !important;
      text-transform: uppercase !important;
      border-radius: 100px !important;
      padding: 4px 10px !important;
    }

    /* Operational */
    .badge-success, .badge.bg-success,
    [class*="operational"], [class*="up"] .badge {
      background-color: #DCFCE7 !important;
      color: #15803D !important;
    }

    /* Down */
    .badge-danger, .badge.bg-danger,
    [class*="down"] .badge {
      background-color: #FEE2E2 !important;
      color: #B91C1C !important;
    }

    /* Degraded */
    .badge-warning, .badge.bg-warning,
    [class*="degraded"] .badge {
      background-color: #FEF9C3 !important;
      color: #854D0E !important;
    }

    /* ── Uptime bars ── */
    .bg-success { background-color: #10B981 !important; }
    .bg-danger  { background-color: #EF4444 !important; }
    .bg-warning { background-color: #F59E0B !important; }

    /* ── Status card left borders ── */
    article.up       { border-left-color: #10B981 !important; }
    article.down     { border-left-color: #EF4444 !important; }
    article.degraded { border-left-color: #F59E0B !important; }

    /* ── All systems operational banner ── */
    .all-good, [class*="all-good"],
    .status-ok, [class*="status-ok"] {
      border-left-color: #10B981 !important;
    }

    /* ── Category headers: Apps / Sites ── */
    .upptime-category-header {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #111111;
      margin: 40px 0 16px;
      padding-top: 40px;
      border-top: 1px solid #E5E5E0;
    }
    .upptime-category-header.first {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    /* ── Sub-group headers: Pour Decisions, Round on Me, etc. ── */
    .upptime-group-header {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6B7280;
      margin: 24px 0 4px;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border) !important;
      background-color: var(--bg) !important;
      color: var(--muted) !important;
      font-size: 13px !important;
    }
  js: |
    (function () {
      var siteMap = {
        'Pour Decisions':                      { category: 'Apps', subGroup: 'Pour Decisions' },
        'Pour Decisions API':                  { category: 'Apps', subGroup: 'Pour Decisions' },
        'Round on Me':                         { category: 'Apps', subGroup: 'Round on Me' },
        'Round on Me API':                     { category: 'Apps', subGroup: 'Round on Me' },
        'The Pollening':                       { category: 'Apps', subGroup: 'The Pollening' },
        'The Pollening API':                   { category: 'Apps', subGroup: 'The Pollening' },
        'SPF or RIP':                          { category: 'Apps', subGroup: 'SPF or RIP' },
        'SPF or RIP API':                      { category: 'Apps', subGroup: 'SPF or RIP' },
        'Fix It, Atlanta':                     { category: 'Apps', subGroup: 'Fix It, Atlanta' },
        'Project Website (madebyaaron.app)':   { category: 'Sites', subGroup: null },
        'Personal Website (aaronsentell.com)': { category: 'Sites', subGroup: null },
        'Referral Site':                       { category: 'Sites', subGroup: null },
        'Civic Site':                          { category: 'Sites', subGroup: null }
      };

      function insertHeaders() {
        var section = document.querySelector('section.live-status');
        if (!section) return false;
        var articles = section.querySelectorAll('article');
        if (!articles.length) return false;
        if (section.querySelector('.upptime-category-header')) return true;

        var lastCategory = null;
        var lastSubGroup = null;

        articles.forEach(function (article) {
          var link = article.querySelector('a');
          if (!link) return;
          var name = link.textContent.trim();
          var info = siteMap[name];
          if (!info) return;

          if (info.category !== lastCategory) {
            var catHeader = document.createElement('div');
            catHeader.className = 'upptime-category-header' + (lastCategory === null ? ' first' : '');
            catHeader.textContent = info.category;
            section.insertBefore(catHeader, article);
            lastCategory = info.category;
            lastSubGroup = null;
          }

          if (info.subGroup && info.subGroup !== lastSubGroup) {
            var subHeader = document.createElement('div');
            subHeader.className = 'upptime-group-header';
            subHeader.textContent = info.subGroup;
            section.insertBefore(subHeader, article);
            lastSubGroup = info.subGroup;
          }
        });
        return true;
      }

      var interval = setInterval(function () {
        if (insertHeaders()) clearInterval(interval);
      }, 200);
      setTimeout(function () { clearInterval(interval); }, 30000);
    })();

assignees:
  - aaronsentell
